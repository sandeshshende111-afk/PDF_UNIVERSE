services:
  - type: web
    name: pdfuniverse
    runtime: node
    plan: free
    buildCommand: npx --yes pnpm@11.7.0 install --frozen-lockfile && npx --yes pnpm@11.7.0 run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: API_URL
        sync: false
